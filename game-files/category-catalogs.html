<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Каталоги - The Outlast Trials RU</title>
  <link rel="icon" href="../logo.png" sizes="any">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Rubik', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 380;
    }

    body {
      background-color: #0a0a0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('../bg-outlast3.jpg');
      background-size: cover;
      background-position: center 50px;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(10, 10, 15, 0.85) 0%, rgba(26, 26, 46, 0.8) 50%, rgba(22, 33, 62, 0.75) 100%);
    }

    .navbar {
      background-color: rgba(26, 26, 46, 0.9);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ff2a2a;
      box-shadow: 0 4px 12px rgba(255, 42, 42, 0.3);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .nav-left {
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-img {
      height: 45px;
      width: auto;
      border-radius: 8px;
    }

    .site-name {
      font-size: 20px;
      font-weight: 500;
      color: #ff2a2a;
      text-shadow: 0 0 10px rgba(255, 42, 42, 0.5);
    }

    .nav-right {
      display: flex;
    }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 15px;
    }

    .nav-menu li a {
      color: #f0f0f0;
      text-decoration: none;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 5px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      background-color: rgba(40, 41, 45, 0.5);
    }

    .nav-menu li a:hover {
      background-color: #ff2a2a;
      color: white;
      transform: translateY(-2px);
    }

    .nav-menu li a.active {
      background-color: #ff2a2a;
      color: white;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: #f0f0f0;
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
      z-index: 1001;
    }

    .content {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 15px;
      flex: 1;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .page-header {
      margin-bottom: 30px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #ff6b6b;
      text-decoration: none;
      font-size: 1rem;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      color: #ff4757;
      transform: translateX(-5px);
    }

    .page-title {
      font-size: 2.5rem;
      color: #ff6b6b;
      text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .page-description {
      font-size: 1.1rem;
      color: #cccccc;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .catalogs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .catalog-card {
      background: linear-gradient(135deg, rgba(40, 41, 45, 0.9), rgba(30, 31, 34, 0.95));
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 107, 107, 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .catalog-card:hover {
      transform: translateY(-8px);
      border-color: #ff6b6b;
      box-shadow: 0 10px 30px rgba(255, 107, 107, 0.2);
    }

    .catalog-cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
    }

    .catalog-content {
      padding: 20px;
      text-align: center;
    }

    .catalog-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #ff6b6b;
      margin-bottom: 5px;
    }

    .catalog-subtitle {
      font-size: 0.8rem;
      color: #aaaaaa;
    }

    /* Модальное окно для просмотра каталога */
    .catalog-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .catalog-modal.active {
      display: flex;
    }

    .book-container {
      position: relative;
      width: 90vw;
      max-width: 1000px;
      height: 70vh;
      max-height: 700px;
      background: #1a1a2a;
      border-radius: 12px;
      border: 1px solid rgba(255, 107, 107, 0.3);
      overflow: hidden;
    }

    .book-viewer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .current-page-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .book-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
      padding: 0 10px;
    }

    .book-nav-btn {
      pointer-events: auto;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(255, 107, 107, 0.8);
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-nav-btn:hover {
      background: #ff4757;
      transform: scale(1.1);
    }

    .book-nav-btn.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .book-close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 20;
    }

    .book-close:hover {
      color: #ff6b6b;
      transform: scale(1.1);
    }

    .page-counter {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      color: #888;
      font-size: 0.8rem;
      z-index: 20;
    }

    @media (max-width: 768px) {
      .bg-image {
        background-image: url('../bg-outlast-mobile.jpg');
        background-position: center top;
        background-attachment: scroll;
        background-position-y: 65px;
      }
      
      .navbar { padding: 12px 15px; flex-wrap: wrap; }
      .logo-img { height: 40px; }
      .site-name { font-size: 18px; }
      .mobile-menu-btn { display: block; }
      .nav-menu { display: none; position: absolute; top: 100%; left: 0; right: 0; background-color: rgba(26, 26, 46, 0.95); flex-direction: column; padding: 15px; border-top: 1px solid #2a2a3e; border-bottom: 2px solid #ff2a2a; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); z-index: 999; backdrop-filter: blur(10px); }
      .nav-menu.active { display: flex !important; }
      .nav-menu li { width: 100%; }
      .nav-menu li a { justify-content: center; padding: 12px; font-size: 18px; width: 100%; }
      
      .page-title { font-size: 1.8rem; }
      .catalogs-grid { grid-template-columns: 1fr; }
      .book-container { height: 50vh; }
      .book-nav-btn { width: 35px; height: 35px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="main-background">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
  </div>

  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">
        <img src="../logo.png" alt="Логотип" class="logo-img" onerror="this.src='logo.png'">
        <span class="site-name">The Outlast Trials RU</span>
      </div>
    </div>
    <button class="mobile-menu-btn" id="mobile-menu-btn">
      <i class="fas fa-bars"></i>
    </button>
    <div class="nav-right">
      <ul class="nav-menu" id="nav-menu">
        <li><a href="../index.html"><i class="fas fa-home"></i> Главная</a></li>
        <li><a href="../roles.html"><i class="fas fa-users"></i> Справочник ролей</a></li>
        <li><a href="../news.html"><i class="fas fa-newspaper"></i> Новости сайта</a></li>
        <li><a href="../about.html"><i class="fas fa-info-circle"></i> Об игре</a></li>
      </ul>
    </div>
  </nav>

  <main class="content">
    <div class="page-header">
      <a href="../about.html" class="back-link"><i class="fas fa-arrow-left"></i> Назад к категориям</a>
      <h1 class="page-title"><i class="fas fa-book"></i> Каталоги</h1>
      <p class="page-description">Коллекционные каталоги поведенческой одежды Муркофф. Нажмите на каталог, чтобы просмотреть его содержимое.</p>
    </div>

    <div class="catalogs-grid" id="catalogs-grid"></div>
  </main>

  <!-- Модальное окно для просмотра каталога -->
  <div id="catalogModal" class="catalog-modal">
    <div class="book-container">
      <span class="book-close">&times;</span>
      <div class="book-viewer">
        <img id="currentPageImg" class="current-page-img" src="" alt="Страница">
      </div>
      <div class="book-nav">
        <button class="book-nav-btn" id="prevPageBtn"><i class="fas fa-chevron-left"></i></button>
        <button class="book-nav-btn" id="nextPageBtn"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="page-counter" id="pageCounter"></div>
    </div>
  </div>

  <script>
    // Данные каталогов - ДОБАВЛЯЙТЕ СВОИ КАТАЛОГИ СЮДА
    const catalogsData = [
      {
        id: "project-judas",
        title: "ПРОЕКТ «ИУДА»",
        subtitle: "КАТАЛОГ ПОВЕДЕНЧЕСКОЙ ОДЕЖДЫ МЕРКОФФ",
        cover: "../screenshots/каталог-иуда.png",
        pages: [
          "../screenshots/иуда-1.png",
          "../screenshots/иуда-2.png"
        ]
      },
      {
        id: "project-messiah",
        title: "ПРОЕКТ «МЕССИЯ»",
        subtitle: "КАТАЛОГ ПОВЕДЕНЧЕСКОЙ ОДЕЖДЫ МЕРКОФФ",
        cover: "../screenshots/каталог-мессия.png",
        pages: [
          "../screenshots/мессия-1.png",
          "../screenshots/мессия-2.png",
          "../screenshots/мессия-3.png"
        ]
      },
      {
        id: "deep-burn",
        title: "ГЛУБОКИЙ ОЖОГ",
        subtitle: "КАТАЛОГ ПОВЕДЕНЧЕСКОЙ ОДЕЖДЫ МЕРКОФФ",
        cover: "../screenshots/каталог-ожог.png",
        pages: [
          "../screenshots/ожог-1.png",
          "../screenshots/ожог-2.png",
          "../screenshots/ожог-3.png"
        ]
      },
      {
        id: "project-diarchy",
        title: "ПРОЕКТ «ДИАРХИЯ»",
        subtitle: "КАТАЛОГ ПОВЕДЕНЧЕСКОЙ ОДЕЖДЫ МЕРКОФФ",
        cover: "../screenshots/каталог-диархия.png",
        pages: [
          "../screenshots/диархия-1.png",
          "../screenshots/диархия-2.png"
        ]
      },
      {
        id: "season-5",
        title: "СЕЗОН 5",
        subtitle: "100% ЗАВЕРШЕНО",
        cover: "../screenshots/сезон-5.png",
        pages: [
          "../screenshots/сезон5-1.png",
          "../screenshots/сезон5-2.png"
        ]
      },
      {
        id: "amelia",
        title: "АМЕЛИЯ",
        subtitle: "КАТАЛОГ ПОВЕДЕНЧЕСКОЙ ОДЕЖДЫ МЕРКОФФ",
        cover: "../screenshots/каталог-амелия.png",
        pages: [
          "../screenshots/амелия-1.png",
          "../screenshots/амелия-2.png",
          "../screenshots/амелия-3.png"
        ]
      },
      {
        id: "season-4",
        title: "СЕЗОН 4",
        subtitle: "100% ЗАВЕРШЕНО",
        cover: "../screenshots/сезон-4.png",
        pages: [
          "../screenshots/сезон4-1.png",
          "../screenshots/сезон4-2.png"
        ]
      },
      {
        id: "prime-time",
        title: "ПРАЙМ-ТАЙМ",
        subtitle: "КАТАЛОГ ПОВЕДЕНЧЕСКОЙ ОДЕЖДЫ МЕРКОФФ",
        cover: "../screenshots/каталог-прайм.png",
        pages: [
          "../screenshots/прайм-1.png",
          "../screenshots/прайм-2.png",
          "../screenshots/прайм-3.png"
        ]
      },
      {
        id: "project-recidive",
        title: "ПРОЕКТ «РЕЦИДИВ»",
        subtitle: "КАТАЛОГ ПОВЕДЕНЧЕСКОЙ ОДЕЖДЫ МЕРКОФФ",
        cover: "../screenshots/каталог-рецидив.png",
        pages: [
          "../screenshots/рецидив-1.png",
          "../screenshots/рецидив-2.png"
        ]
      },
      {
        id: "winter-brings-death",
        title: "ЗИМА ПРИНОСИТ СМЕРТЬ",
        subtitle: "КАТАЛОГ ПОВЕДЕНЧЕСКОЙ ОДЕЖДЫ МЕРКОФФ",
        cover: "../screenshots/каталог-зима.png",
        pages: [
          "../screenshots/зима-1.png",
          "../screenshots/зима-2.png"
        ]
      },
      {
        id: "deluxe",
        title: "ДЕЛЮКС – КАТАЛОГ",
        subtitle: "2025",
        cover: "../screenshots/каталог-делюкс.png",
        pages: [
          "../screenshots/делюкс-1.png",
          "../screenshots/делюкс-2.png",
          "../screenshots/делюкс-3.png",
          "../screenshots/делюкс-4.png"
        ]
      }
    ];

    let currentCatalog = null;
    let currentPageIndex = 0;
    let totalPages = 0;
    let isAnimating = false;

    function displayCatalogs() {
      const container = document.getElementById('catalogs-grid');
      if (!container) return;
      
      container.innerHTML = '';
      
      catalogsData.forEach(catalog => {
        const card = document.createElement('div');
        card.className = 'catalog-card';
        
        card.addEventListener('click', () => {
          openCatalog(catalog);
        });
        
        card.innerHTML = `
          <img src="${catalog.cover}" class="catalog-cover" alt="${catalog.title}" onerror="this.src='https://via.placeholder.com/300x400?text=${encodeURIComponent(catalog.title)}'">
          <div class="catalog-content">
            <h3 class="catalog-title">${catalog.title}</h3>
            <p class="catalog-subtitle">${catalog.subtitle}</p>
          </div>
        `;
        
        container.appendChild(card);
      });
    }

    function openCatalog(catalog) {
      currentCatalog = catalog;
      currentPageIndex = 0;
      totalPages = catalog.pages.length;
      isAnimating = false;
      
      const modal = document.getElementById('catalogModal');
      const img = document.getElementById('currentPageImg');
      const counter = document.getElementById('pageCounter');
      
      img.src = catalog.pages[0];
      counter.textContent = `Страница 1 из ${totalPages}`;
      
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
      
      updateNavButtons();
    }

    function updateNavButtons() {
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      
      if (currentPageIndex === 0) {
        prevBtn.classList.add('disabled');
      } else {
        prevBtn.classList.remove('disabled');
      }
      
      if (currentPageIndex >= totalPages - 1) {
        nextBtn.classList.add('disabled');
      } else {
        nextBtn.classList.remove('disabled');
      }
    }

    function goToPage(index) {
      if (isAnimating) return;
      if (index < 0 || index >= totalPages) return;
      if (index === currentPageIndex) return;
      
      isAnimating = true;
      const img = document.getElementById('currentPageImg');
      const counter = document.getElementById('pageCounter');
      
      // Анимация перелистывания
      img.style.transform = index > currentPageIndex ? 'translateX(-30px) rotateY(-5deg)' : 'translateX(30px) rotateY(5deg)';
      img.style.opacity = '0.5';
      
      setTimeout(() => {
        currentPageIndex = index;
        img.src = currentCatalog.pages[currentPageIndex];
        counter.textContent = `Страница ${currentPageIndex + 1} из ${totalPages}`;
        
        img.style.transform = '';
        img.style.opacity = '';
        
        setTimeout(() => {
          isAnimating = false;
        }, 100);
      }, 200);
      
      updateNavButtons();
    }

    function nextPage() {
      if (currentPageIndex < totalPages - 1) {
        goToPage(currentPageIndex + 1);
      }
    }

    function prevPage() {
      if (currentPageIndex > 0) {
        goToPage(currentPageIndex - 1);
      }
    }

    function closeModal() {
      document.getElementById('catalogModal').classList.remove('active');
      document.body.style.overflow = '';
      currentCatalog = null;
      currentPageIndex = 0;
    }

    function initMobileMenu() {
      const mobileMenuBtn = document.getElementById('mobile-menu-btn');
      const navMenu = document.getElementById('nav-menu');
      
      if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', function(event) {
          event.preventDefault();
          event.stopPropagation();
          navMenu.classList.toggle('active');
          const icon = this.querySelector('i');
          if (navMenu.classList.contains('active')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
          } else {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
          }
        });
        
        const navLinks = document.querySelectorAll('.nav-menu a');
        navLinks.forEach(link => {
          link.addEventListener('click', function() {
            navMenu.classList.remove('active');
            const icon = mobileMenuBtn.querySelector('i');
            if (icon) {
              icon.classList.remove('fa-times');
              icon.classList.add('fa-bars');
            }
          });
        });
        
        document.addEventListener('click', function(event) {
          if (!navMenu.contains(event.target) && !mobileMenuBtn.contains(event.target)) {
            navMenu.classList.remove('active');
            const icon = mobileMenuBtn.querySelector('i');
            if (icon) {
              icon.classList.remove('fa-times');
              icon.classList.add('fa-bars');
            }
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      displayCatalogs();
      initMobileMenu();
      
      document.getElementById('prevPageBtn').addEventListener('click', prevPage);
      document.getElementById('nextPageBtn').addEventListener('click', nextPage);
      document.querySelector('.book-close').addEventListener('click', closeModal);
      
      document.getElementById('catalogModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
      
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.getElementById('catalogModal').classList.contains('active')) {
          closeModal();
        }
        if (e.key === 'ArrowLeft' && document.getElementById('catalogModal').classList.contains('active')) {
          prevPage();
        }
        if (e.key === 'ArrowRight' && document.getElementById('catalogModal').classList.contains('active')) {
          nextPage();
        }
      });
    });
  </script>
  <script src="../maintenance-mode.js"></script>
</body>
</html>
