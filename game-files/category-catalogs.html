<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Каталоги - The Outlast Trials RU</title>
  <link rel="icon" href="../logo.png" sizes="any">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Rubik', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 380;
    }

    body {
      background-color: #0a0a0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('../bg-outlast3.jpg');
      background-size: cover;
      background-position: center 50px;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(10, 10, 15, 0.85) 0%, rgba(26, 26, 46, 0.8) 50%, rgba(22, 33, 62, 0.75) 100%);
    }

    .navbar {
      background-color: rgba(26, 26, 46, 0.9);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ff2a2a;
      box-shadow: 0 4px 12px rgba(255, 42, 42, 0.3);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .nav-left {
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-img {
      height: 45px;
      width: auto;
      border-radius: 8px;
    }

    .site-name {
      font-size: 20px;
      font-weight: 500;
      color: #ff2a2a;
      text-shadow: 0 0 10px rgba(255, 42, 42, 0.5);
    }

    .nav-right {
      display: flex;
    }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 15px;
    }

    .nav-menu li a {
      color: #f0f0f0;
      text-decoration: none;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 5px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      background-color: rgba(40, 41, 45, 0.5);
    }

    .nav-menu li a:hover {
      background-color: #ff2a2a;
      color: white;
      transform: translateY(-2px);
    }

    .nav-menu li a.active {
      background-color: #ff2a2a;
      color: white;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: #f0f0f0;
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
      z-index: 1001;
    }

    .content {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 15px;
      flex: 1;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .page-header {
      margin-bottom: 30px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #ff6b6b;
      text-decoration: none;
      font-size: 1rem;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      color: #ff4757;
      transform: translateX(-5px);
    }

    .page-title {
      font-size: 2.5rem;
      color: #ff6b6b;
      text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .page-description {
      font-size: 1.1rem;
      color: #cccccc;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* Сетка каталогов */
    .catalogs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .catalog-card {
      background: linear-gradient(135deg, rgba(40, 41, 45, 0.9), rgba(30, 31, 34, 0.95));
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 107, 107, 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .catalog-card:hover {
      transform: translateY(-8px);
      border-color: #ff6b6b;
      box-shadow: 0 10px 30px rgba(255, 107, 107, 0.2);
    }

    .catalog-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .catalog-content {
      padding: 20px;
      text-align: center;
    }

    .catalog-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #ff6b6b;
      margin-bottom: 8px;
    }

    .catalog-subtitle {
      font-size: 0.85rem;
      color: #aaaaaa;
    }

    /* Модальное окно для просмотра каталога (книжка) */
    .catalog-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .catalog-modal.active {
      display: flex;
    }

    .book-container {
      position: relative;
      width: 800px;
      max-width: 90vw;
      height: 500px;
      perspective: 1500px;
    }

    .book {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .book-page {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
      border-radius: 8px;
      backface-visibility: hidden;
      overflow-y: auto;
      padding: 30px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .book-page::-webkit-scrollbar {
      width: 5px;
    }

    .book-page::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .book-page::-webkit-scrollbar-thumb {
      background: #ff6b6b;
      border-radius: 10px;
    }

    .page-left {
      left: 0;
      transform-origin: left;
      transform: rotateY(0deg);
    }

    .page-right {
      right: 0;
      transform-origin: right;
      transform: rotateY(0deg);
    }

    .flip-left {
      transform: rotateY(-180deg);
    }

    .flip-right {
      transform: rotateY(180deg);
    }

    .book-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
    }

    .book-nav-btn {
      pointer-events: auto;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(255, 107, 107, 0.8);
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-nav-btn:hover {
      background: #ff4757;
      transform: scale(1.1);
    }

    .book-nav-btn.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .book-close {
      position: absolute;
      top: -40px;
      right: 0;
      font-size: 30px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 20;
    }

    .book-close:hover {
      color: #ff6b6b;
      transform: scale(1.1);
    }

    .page-content {
      color: #e0e0e0;
    }

    .page-content h2 {
      color: #ff6b6b;
      margin-bottom: 15px;
      font-size: 1.5rem;
    }

    .page-content p {
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .page-content ul {
      margin-left: 20px;
      margin-bottom: 15px;
    }

    .page-content li {
      margin-bottom: 8px;
    }

    .page-number {
      text-align: center;
      margin-top: 20px;
      color: #888;
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      .bg-image {
        background-image: url('../bg-outlast-mobile.jpg');
        background-position: center top;
        background-attachment: scroll;
        background-position-y: 65px;
      }
      
      .navbar { padding: 12px 15px; flex-wrap: wrap; }
      .logo-img { height: 40px; }
      .site-name { font-size: 18px; }
      .mobile-menu-btn { display: block; }
      .nav-menu { display: none; position: absolute; top: 100%; left: 0; right: 0; background-color: rgba(26, 26, 46, 0.95); flex-direction: column; padding: 15px; border-top: 1px solid #2a2a3e; border-bottom: 2px solid #ff2a2a; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); z-index: 999; backdrop-filter: blur(10px); }
      .nav-menu.active { display: flex !important; }
      .nav-menu li { width: 100%; }
      .nav-menu li a { justify-content: center; padding: 12px; font-size: 18px; width: 100%; }
      
      .page-title { font-size: 1.8rem; }
      .catalogs-grid { grid-template-columns: 1fr; }
      .book-container { height: 400px; }
      .book-page { padding: 20px; }
      .page-content h2 { font-size: 1.2rem; }
    }
  </style>
</head>

        image: "../screenshots/каталог-делюкс.png",
        pages: [
          { title: "Обзор каталога", content: "<p>Делюкс-каталог 2025 года — эксклюзивные предметы для коллекционеров.</p><h3>Содержит:</h3><ul><li>Золотой скин «Избранный»</li><li>Платиновый аксессуар</li><li>Эксклюзивный значок</li></ul>" },
          { title: "Золотой скин «Избранный»", content: "<h3>Золотой скин «Избранный»</h3><p>Полностью золотой костюм для самых преданных реагентов.</p><p><strong>Особенности:</strong> Привлекает внимание всех врагов.</p>" }
        ]
      }
    ];

    let currentCatalog = null;
    let currentPage = 0;
    let totalPages = 0;
    let isAnimating = false;

    function displayCatalogs() {
      const container = document.getElementById('catalogs-grid');
      if (!container) return;
      
      container.innerHTML = '';
      
      catalogsData.forEach(catalog => {
        const card = document.createElement('div');
        card.className = 'catalog-card';
        
        card.addEventListener('click', () => {
          openCatalog(catalog);
        });
        
        card.innerHTML = `
          <img src="${catalog.image}" class="catalog-image" alt="${catalog.title}" onerror="this.style.display='none'">
          <div class="catalog-content">
            <h3 class="catalog-title">${catalog.title}</h3>
            <p class="catalog-subtitle">${catalog.subtitle}</p>
          </div>
        `;
        
        container.appendChild(card);
      });
    }

    function openCatalog(catalog) {
      currentCatalog = catalog;
      currentPage = 0;
      totalPages = catalog.pages.length;
      isAnimating = false;
      
      document.getElementById('catalogModal').classList.add('active');
      document.body.style.overflow = 'hidden';
      
      updateBookPages();
      updateNavButtons();
    }

    function updateBookPages() {
      const leftPageIdx = currentPage * 2;
      const rightPageIdx = currentPage * 2 + 1;
      
      const leftContent = document.getElementById('page-left-content');
      const rightContent = document.getElementById('page-right-content');
      const leftNumber = document.getElementById('page-left-number');
      const rightNumber = document.getElementById('page-right-number');
      
      // Левая страница
      if (leftPageIdx < totalPages) {
        const page = currentCatalog.pages[leftPageIdx];
        leftContent.innerHTML = `<h2>${page.title}</h2>${page.content}`;
        leftNumber.textContent = `Страница ${leftPageIdx + 1} из ${totalPages}`;
      } else {
        leftContent.innerHTML = '<h2>Конец каталога</h2><p>Это последняя страница.</p>';
        leftNumber.textContent = `—`;
      }
      
      // Правая страница
      if (rightPageIdx < totalPages) {
        const page = currentCatalog.pages[rightPageIdx];
        rightContent.innerHTML = `<h2>${page.title}</h2>${page.content}`;
        rightNumber.textContent = `Страница ${rightPageIdx + 1} из ${totalPages}`;
      } else {
        rightContent.innerHTML = '<h2>Пустая страница</h2><p>Здесь пока ничего нет.</p>';
        rightNumber.textContent = `—`;
      }
    }

    function updateNavButtons() {
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      
      if (currentPage === 0) {
        prevBtn.classList.add('disabled');
      } else {
        prevBtn.classList.remove('disabled');
      }
      
      if (currentPage >= Math.ceil(totalPages / 2) - 1) {
        nextBtn.classList.add('disabled');
      } else {
        nextBtn.classList.remove('disabled');
      }
    }

    function nextPage() {
      if (isAnimating) return;
      if (currentPage >= Math.ceil(totalPages / 2) - 1) return;
      
      isAnimating = true;
      const book = document.getElementById('book');
      const rightPage = document.querySelector('.page-right');
      
      book.style.transform = 'translateX(-50%) rotateY(-30deg)';
      
      setTimeout(() => {
        currentPage++;
        updateBookPages();
        updateNavButtons();
        
        book.style.transform = '';
        
        setTimeout(() => {
          isAnimating = false;
        }, 300);
      }, 300);
    }

    function prevPage() {
      if (isAnimating) return;
      if (currentPage === 0) return;
      
      isAnimating = true;
      const book = document.getElementById('book');
      const leftPage = document.querySelector('.page-left');
      
      book.style.transform = 'translateX(50%) rotateY(30deg)';
      
      setTimeout(() => {
        currentPage--;
        updateBookPages();
        updateNavButtons();
        
        book.style.transform = '';
        
        setTimeout(() => {
          isAnimating = false;
        }, 300);
      }, 300);
    }

    function closeModal() {
      document.getElementById('catalogModal').classList.remove('active');
      document.body.style.overflow = '';
      currentCatalog = null;
      currentPage = 0;
    }

    function initMobileMenu() {
      const mobileMenuBtn = document.getElementById('mobile-menu-btn');
      const navMenu = document.getElementById('nav-menu');
      
      if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', function(event) {
          event.preventDefault();
          event.stopPropagation();
          navMenu.classList.toggle('active');
          const icon = this.querySelector('i');
          if (navMenu.classList.contains('active')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
          } else {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
          }
        });
        
        const navLinks = document.querySelectorAll('.nav-menu a');
        navLinks.forEach(link => {
          link.addEventListener('click', function() {
            navMenu.classList.remove('active');
            const icon = mobileMenuBtn.querySelector('i');
            if (icon) {
              icon.classList.remove('fa-times');
              icon.classList.add('fa-bars');
            }
          });
        });
        
        document.addEventListener('click', function(event) {
          if (!navMenu.contains(event.target) && !mobileMenuBtn.contains(event.target)) {
            navMenu.classList.remove('active');
            const icon = mobileMenuBtn.querySelector('i');
            if (icon) {
              icon.classList.remove('fa-times');
              icon.classList.add('fa-bars');
            }
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      displayCatalogs();
      initMobileMenu();
      
      document.getElementById('prevPageBtn').addEventListener('click', prevPage);
      document.getElementById('nextPageBtn').addEventListener('click', nextPage);
      document.querySelector('.book-close').addEventListener('click', closeModal);
      
      document.getElementById('catalogModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
      
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.getElementById('catalogModal').classList.contains('active')) {
          closeModal();
        }
        if (e.key === 'ArrowLeft' && document.getElementById('catalogModal').classList.contains('active')) {
          prevPage();
        }
        if (e.key === 'ArrowRight' && document.getElementById('catalogModal').classList.contains('active')) {
          nextPage();
        }
      });
    });
  </script>
  <script src="../maintenance-mode.js"></script>
</body>
</html>
